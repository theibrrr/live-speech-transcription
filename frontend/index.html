<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Real-time speech-to-text transcription using Whisper, Wav2Vec2, DeepFilterNet, and VAD models">
    <title>Live Speech Transcription</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- Background animated elements -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo-group">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                            <line x1="12" y1="19" x2="12" y2="23" />
                            <line x1="8" y1="23" x2="16" y2="23" />
                        </svg>
                    </div>
                    <div>
                        <h1>Live Speech Transcription</h1>
                        <p class="subtitle">Real-time speech-to-text demo</p>
                    </div>
                </div>
                <div class="connection-badge" id="connectionBadge">
                    <span class="badge-dot"></span>
                    <span class="badge-text">Disconnected</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Left: Settings Panel -->
            <aside class="settings-panel" id="settingsPanel">
                <div class="panel-header">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83" />
                    </svg>
                    <span>Pipeline Settings</span>
                </div>

                <!-- Noise Suppression -->
                <div class="setting-group">
                    <label class="setting-label">Noise Suppression</label>
                    <div class="select-wrapper">
                        <select id="nsSelect" class="custom-select">
                            <option value="none">None</option>
                            <option value="deepfilter">DeepFilterNet3</option>
                        </select>
                        <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </div>
                </div>

                <!-- VAD Model -->
                <div class="setting-group">
                    <label class="setting-label">VAD Model</label>
                    <div class="select-wrapper">
                        <select id="vadSelect" class="custom-select">
                            <option value="silero">Silero VAD</option>
                            <option value="webrtc">WebRTC VAD</option>
                            <option value="none">None</option>
                        </select>
                        <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </div>
                </div>

                <!-- Speech Model -->
                <div class="setting-group">
                    <label class="setting-label">Speech Model</label>
                    <div class="select-wrapper">
                        <select id="sttSelect" class="custom-select">
                            <!-- Populated dynamically from /config -->
                        </select>
                        <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </div>
                </div>

                <!-- Language (dynamic based on model) -->
                <div class="setting-group">
                    <label class="setting-label">Language</label>
                    <div class="select-wrapper">
                        <select id="langSelect" class="custom-select">
                            <!-- Populated dynamically based on selected model -->
                        </select>
                        <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </div>
                </div>

                <!-- Chunk Duration -->
                <div class="setting-group">
                    <label class="setting-label">Chunk Duration (ms)</label>
                    <input type="number" id="chunkInput" class="custom-input" value="1000" min="250" max="5000"
                        step="250">
                </div>

                <!-- Control Buttons -->
                <div class="control-buttons">
                    <button class="btn btn-start" id="btnStart">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                        Start
                    </button>
                    <button class="btn btn-stop" id="btnStop" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="4" y="4" width="16" height="16" rx="2" />
                        </svg>
                        Stop
                    </button>
                </div>
            </aside>

            <!-- Center: Transcript Area -->
            <section class="transcript-panel">
                <div class="panel-header">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                    <span>Live Transcript</span>
                    <button class="btn-icon" id="btnClear" title="Clear transcript">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                    </button>
                </div>
                <div class="transcript-content" id="transcriptContent">
                    <div class="transcript-placeholder" id="transcriptPlaceholder">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                            <line x1="12" y1="19" x2="12" y2="23" />
                            <line x1="8" y1="23" x2="16" y2="23" />
                        </svg>
                        <p>Press <strong>Start</strong> to begin live transcription</p>
                        <p class="hint">Select your preferred models in the settings panel</p>
                    </div>
                    <div class="transcript-text" id="transcriptText"></div>
                </div>
                <div class="visualizer-bar" id="visualizerBar">
                    <canvas id="visualizerCanvas"></canvas>
                </div>
            </section>
        </main>

        <!-- Status Bar -->
        <footer class="status-bar" id="statusBar">
            <div class="status-item">
                <span class="status-label">Latency</span>
                <span class="status-value" id="statLatency">— ms</span>
            </div>
            <div class="status-divider"></div>
            <div class="status-item">
                <span class="status-label">Chunk</span>
                <span class="status-value" id="statChunk">1000 ms</span>
            </div>
            <div class="status-divider"></div>
            <div class="status-item">
                <span class="status-label">NS</span>
                <span class="status-value" id="statNS">OFF</span>
            </div>
            <div class="status-divider"></div>
            <div class="status-item">
                <span class="status-label">VAD</span>
                <span class="status-value" id="statVAD">silero</span>
            </div>
            <div class="status-divider"></div>
            <div class="status-item">
                <span class="status-label">STT</span>
                <span class="status-value" id="statSTT">—</span>
            </div>
            <div class="status-divider"></div>
            <div class="status-item">
                <span class="status-label">Lang</span>
                <span class="status-value" id="statLang">en</span>
            </div>
            <div class="status-divider"></div>
            <div class="status-item">
                <span class="status-label">Device</span>
                <span class="status-value device-badge" id="statDevice">—</span>
            </div>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
